# Локальный прогон production-образа перед деплоем на Amvera
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_secret_change_me
      POSTGRES_DB: adminka_masterov
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d adminka_masterov"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://app:app_secret_change_me@db:5432/adminka_masterov?sslmode=disable
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production-min-32-chars}
      AUTH_URL: ${AUTH_URL:-http://localhost:3002}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      PLATFORM_ADMIN_SECRET: ${PLATFORM_ADMIN_SECRET:-}
      NEXT_PUBLIC_BILLING_EMAIL: ${NEXT_PUBLIC_BILLING_EMAIL:-}
      NEXT_PUBLIC_BILLING_PHONE: ${NEXT_PUBLIC_BILLING_PHONE:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
